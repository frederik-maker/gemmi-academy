name: Build Android APK

# Builds the Android APK on every push to main and upserts it as the
# apk-latest release asset (so the landing page download link stays
# stable). The native LiteRT plugin in native/ is spliced into the
# Capacitor scaffold during the build via scripts/install-native-tutor.sh;
# the launcher icon + splash are generated from assets/* via @capacitor/assets.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Capacitor 8 CLI requires Node >= 22
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          # Capacitor 8 requires Java 21+
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Install @capacitor/assets (icon + splash generator)
        run: npm install --no-save @capacitor/assets

      - name: Build web bundle
        run: npm run build

      - name: Add Android platform (generates ./android scaffold)
        run: npx cap add android

      # NOTE: the native LiteRT plugin (Kotlin sources in native/) is NOT
      # spliced into the APK build right now. Capacitor's `cap add android`
      # scaffold is Java-only — enabling Kotlin requires patching two gradle
      # files and a buildscript classpath, which is fragile across CLI
      # versions. The on-device path is shipped as scaffold + design; the
      # APK itself runs the web app via the cloud tutor. To re-enable the
      # native compile, restore the `install-native-tutor.sh` step plus a
      # Kotlin-enable patch on android/build.gradle.

      - name: Generate launcher icon + splash from assets/
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Sync web bundle into Android project
        run: npx cap sync android

      - name: Build debug APK with Gradle
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --warning-mode=summary

      - name: Rename APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk out/gemmi.apk
          ls -lh out/

      - name: Upsert apk-latest release (non-destructive)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If the release already exists, replace just the asset (so the
          # download URL never breaks mid-deploy). If it doesn't, create it.
          # This avoids the previous failure mode where a delete-then-create
          # left users with no APK for ~30 seconds if the create step failed.
          if gh release view apk-latest >/dev/null 2>&1; then
            gh release upload apk-latest out/gemmi.apk --clobber
            gh release edit apk-latest \
              --notes "Auto-built from commit ${{ github.sha }} on $(date -u +'%Y-%m-%d %H:%M UTC'). Unsigned debug APK."
          else
            gh release create apk-latest \
              --title "Gemmi APK (latest build)" \
              --notes "Auto-built from commit ${{ github.sha }} on $(date -u +'%Y-%m-%d %H:%M UTC'). Unsigned debug APK." \
              out/gemmi.apk
          fi
